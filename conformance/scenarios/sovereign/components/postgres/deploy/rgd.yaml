# ResourceGraphDefinition for PostgreSQL deployment
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: sovereign-postgres
spec:
  schema:
    apiVersion: v1alpha1
    kind: SovereignPostgres
    spec:
      prefix: string | default="sovereign-postgres"
      database:
        name: string | default="sovereign_notes"
        username: string | default="sovereign_user"
        password: string | default="changeme"
      resources:
        requests:
          cpu: string | default="250m"
          memory: string | default="256Mi"
        limits:
          cpu: string | default="500m"
          memory: string | default="512Mi"
      persistence:
        size: string | default="8Gi"

  resources:
    # OCM Resource: resolve helm-chart from component
    - id: resourceChart
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-chart"
        spec:
          componentRef:
            name: sovereign-postgres-component
          resource:
            byReference:
              resource:
                name: helm-chart
          additionalStatusFields:
            registry: resource.access.globalAccess.imageReference.toOCI().registry
            repository: resource.access.globalAccess.imageReference.toOCI().repository
            digest: resource.access.globalAccess.imageReference.toOCI().digest
          interval: 10m

    # OCM Resource: resolve image from component
    - id: resourceImage
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.prefix}-resource-image"
        spec:
          componentRef:
            name: sovereign-postgres-component
          resource:
            byReference:
              resource:
                name: image
          additionalStatusFields:
            registry: resource.access.globalAccess.imageReference.toOCI().registry
            repository: resource.access.globalAccess.imageReference.toOCI().repository
            tag: resource.access.globalAccess.imageReference.toOCI().tag
            digest: resource.access.globalAccess.imageReference.toOCI().digest
          interval: 10m

    # FluxCD OCIRepository for Helm chart
    - id: ociRepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: "${schema.spec.prefix}-oci-repository"
        spec:
          interval: 1m0s
          insecure: true
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          url: oci://${resourceChart.status.additional.registry}/${resourceChart.status.additional.repository}
          ref:
            digest: ${resourceChart.status.additional.digest}

    # FluxCD HelmRelease
    - id: helmRelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: "${schema.spec.prefix}-helm-release"
        spec:
          releaseName: "${schema.spec.prefix}"
          interval: 1m
          timeout: 5m
          chartRef:
            kind: OCIRepository
            name: ${ociRepository.metadata.name}
          values:
            image:
              repository: ${resourceImage.status.additional.registry}/${resourceImage.status.additional.repository}
              tag: ${resourceImage.status.additional.tag}@${resourceImage.status.additional.digest}
            postgresql:
              postgresqlDatabase: ${schema.spec.database.name}
              postgresqlUsername: ${schema.spec.database.username}
              postgresqlPassword: ${schema.spec.database.password}
              persistence:
                size: ${schema.spec.persistence.size}
            resources:
              requests:
                cpu: ${schema.spec.resources.requests.cpu}
                memory: ${schema.spec.resources.requests.memory}
              limits:
                cpu: ${schema.spec.resources.limits.cpu}
                memory: ${schema.spec.resources.limits.memory}
