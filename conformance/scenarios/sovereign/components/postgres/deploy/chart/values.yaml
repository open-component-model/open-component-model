# Default values for sovereign-postgres
replicaCount: 1

image:
  repository: postgres
  pullPolicy: IfNotPresent
  tag: "18@sha256:059fa0289cc5a184034e05a1f4f6d6fd79f69dc718b8b04ab60b6b469eed411e"

nameOverride: ""
fullnameOverride: "postgres"

postgresql:
  # Database configuration
  postgresqlDatabase: sovereign_notes
  postgresqlUsername: sovereign_user
  # NOTE: Demo-only default. Production deployments should use External Secrets
  # Operator (ESO) or a similar secret management solution.
  postgresqlPassword: changeme
  
  # Additional configuration
  postgresqlMaxConnections: 100
  postgresqlSharedPreloadLibraries: ""
  
  # Persistence
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi

service:
  type: ClusterIP
  port: 5432

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

podSecurityContext:
  # NOTE: The official postgres image starts as root and internally drops
  # privileges to the postgres user (UID 999). runAsNonRoot must be false.
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: false

# Annotations
podAnnotations: {}
serviceAnnotations: {}

# Labels
labels:
  app.kubernetes.io/component: database