# ResourceGraphDefinition for deploying sovereign-notes via kro
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: sovereign-notes
spec:
  schema:
    apiVersion: v1alpha1
    kind: SovereignNotes
    spec:
      releaseName: string | default="sovereign-notes"
      replicas: integer | default=2
      databaseSecretRef: string | default="db-credentials"
      resources:
        requests:
          memory: string | default="64Mi"
          cpu: string | default="100m"
        limits:
          memory: string | default="128Mi"
          cpu: string | default="200m"

  resources:
    # OCM Resource: resolve helm-chart from component
    - id: resourceChart
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.releaseName}-resource-chart"
        spec:
          componentRef:
            name: sovereign-notes-component
          resource:
            byReference:
              resource:
                name: helm-chart
          additionalStatusFields:
            repository: resource.access.globalAccess.imageReference.toOCI().repository
            digest: resource.access.globalAccess.imageReference.toOCI().digest
          interval: 10m

    # OCM Resource: resolve image from component
    - id: resourceImage
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: "${schema.spec.releaseName}-resource-image"
        spec:
          componentRef:
            name: sovereign-notes-component
          resource:
            byReference:
              resource:
                name: image
          additionalStatusFields:
            repository: resource.access.globalAccess.imageReference.toOCI().repository
            tag: resource.access.globalAccess.imageReference.toOCI().tag
          interval: 10m

    # FluxCD OCIRepository for Helm chart
    - id: ociRepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1beta2
        kind: OCIRepository
        metadata:
          name: "${schema.spec.releaseName}-oci-repository"
        spec:
          interval: 1m0s
          insecure: true
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          url: ${resourceChart.status.additional.registry}/${resourceChart.status.additional.repository}
          ref:
            digest: ${resourceChart.status.additional.digest}

    # FluxCD HelmRelease
    - id: helmRelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: "${schema.spec.releaseName}"
        spec:
          releaseName: "${schema.spec.releaseName}"
          interval: 1m
          timeout: 5m
          chartRef:
            kind: OCIRepository
            name: ${ociRepository.metadata.name}
          values:
            replicaCount: ${schema.spec.replicas}
            image:
              repository: ${resourceImage.status.additional.registry}/${resourceImage.status.additional.repository}
              tag: ${resourceImage.status.additional.tag}
            databaseSecretRef: ${schema.spec.databaseSecretRef}
            resources:
              requests:
                memory: ${schema.spec.resources.requests.memory}
                cpu: ${schema.spec.resources.requests.cpu}
              limits:
                memory: ${schema.spec.resources.limits.memory}
                cpu: ${schema.spec.resources.limits.cpu}
