# ResourceGraphDefinition for sovereign product orchestration
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: sovereign-product
spec:
  schema:
    apiVersion: v1alpha1
    kind: SovereignProduct
    spec:
      prefix: string | default="sovereign-product"
      version: string | default="1.0.0"
      notes:
        replicas: integer | default=2
        resources:
          requests:
            cpu: string | default="100m"
            memory: string | default="64Mi"
          limits:
            cpu: string | default="200m"
            memory: string | default="128Mi"
      postgres:
        database:
          name: string | default="sovereign_notes"
          username: string | default="sovereign_user"
          password: string | default="changeme"
        persistence:
          size: string | default="8Gi"
        resources:
          requests:
            cpu: string | default="250m"
            memory: string | default="256Mi"
          limits:
            cpu: string | default="500m"
            memory: string | default="512Mi"

  resources:
    # Namespace for sovereign product
    - id: productNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: sovereign-product

    # ConfigMap with database configuration
    - id: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: sovereign-product-config
          namespace: ${productNamespace.metadata.name}
        data:
          database.host: "postgres"
          database.port: "5432"
          database.name: ${schema.spec.postgres.database.name}

    # Secret with database credentials
    - id: secrets
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: sovereign-product-secrets
          namespace: ${productNamespace.metadata.name}
        type: Opaque
        stringData:
          database.username: ${schema.spec.postgres.database.username}
          database.password: ${schema.spec.postgres.database.password}

    # PostgreSQL instance (kro CR)
    - id: postgresInstance
      template:
        apiVersion: kro.run/v1alpha1
        kind: SovereignPostgres
        metadata:
          name: postgres
          namespace: ${productNamespace.metadata.name}
        spec:
          database:
            name: ${schema.spec.postgres.database.name}
            username: ${schema.spec.postgres.database.username}
            password: ${schema.spec.postgres.database.password}
          resources:
            requests:
              cpu: ${schema.spec.postgres.resources.requests.cpu}
              memory: ${schema.spec.postgres.resources.requests.memory}
            limits:
              cpu: ${schema.spec.postgres.resources.limits.cpu}
              memory: ${schema.spec.postgres.resources.limits.memory}
          persistence:
            size: ${schema.spec.postgres.persistence.size}

    # Notes application instance (kro CR)
    - id: notesInstance
      template:
        apiVersion: kro.run/v1alpha1
        kind: SovereignNotes
        metadata:
          name: notes
          namespace: ${productNamespace.metadata.name}
        spec:
          releaseName: notes
          replicas: ${schema.spec.notes.replicas}
          databaseSecretRef: ${secrets.metadata.name}
          resources:
            requests:
              memory: ${schema.spec.notes.resources.requests.memory}
              cpu: ${schema.spec.notes.resources.requests.cpu}
            limits:
              memory: ${schema.spec.notes.resources.limits.memory}
              cpu: ${schema.spec.notes.resources.limits.cpu}
