# Taskfile for OCM Sovereign Scenario Conformance
version: '3'

vars:
  CLI_IMAGE: '{{ .CLI_IMAGE | default "ghcr.io/open-component-model/cli:main" }}'
  DOCKER_NETWORK: '{{ .DOCKER_NETWORK | default "kind" }}'
  VERSION: '1.0.0'
  POSTGRES_VERSION: '{{.POSTGRES_VERSION | default "18"}}'
  KIND_NODE_IMAGE_VERSION: "v1.34.0"
  CTF: '{{ .TASKFILE_DIR }}/tmp/transport-archive'
  AIRGAP_CTF: '{{ .TASKFILE_DIR }}/tmp/airgap-archive'
  CLUSTER_NAME: sovereign-conformance
  NAME: acme.org/sovereign/product
  PUSH_IMAGE: '{{.PUSH_IMAGE | default "true"}}'
  OCM_TMPDIR: '{{ .TASKFILE_DIR }}/tmp'
  OCM_CREDENTIALS_CONFIG: '{{ .TASKFILE_DIR }}/tmp/credentials.yaml'
  REGISTRY_NAME: "registry"
  REGISTRY_PORT: "5001"
  ocm: >-
    docker run --rm
    --network {{ .DOCKER_NETWORK }}
    --user $(id -u):$(id -g)
    -v {{ .TASKFILE_DIR }}:{{ .TASKFILE_DIR }}
    -e TMPDIR={{ .OCM_TMPDIR }}
    -e NAME -e VERSION -e POSTGRES_VERSION -e OCI_LAYOUT -e OCM_CONFIG
    -w $PWD
    {{ .CLI_IMAGE }}

tasks:
  prepare:
    internal: true
    desc: Prepare environment for containerized CLI
    cmds:
      - mkdir -p {{ .OCM_TMPDIR }}
      - task: prepare:credentials

  run:
    dir: scenarios/sovereign
    deps:
      - check
      - clean
    desc: Run the conformance scenario end-to-end with kind
    env:
      CLUSTER_NAME: "{{.CLUSTER_NAME}}"
      REGISTRY_NAME: "{{.REGISTRY_NAME}}"
      REGISTRY_PORT: "{{.REGISTRY_PORT}}"
      KIND_NODE_IMAGE_VERSION: "{{.KIND_NODE_IMAGE_VERSION}}"
    cmds:
      - task: prepare
      - cmd: bash scripts/setup-airgapped-kind.sh {{.CLUSTER_NAME}}
      - task: cluster:install:toolkit
      - task: build:product
      - task: transfer:airgap
      - task: cluster:import
      - task: cluster:bootstrap

  upgrade:
    dir: scenarios/sovereign
    desc: Test upgrade scenario
    vars:
      NEW_VERSION: "1.1.0"
    cmds:
      - cmd: rm -rf {{.CTF}} {{.AIRGAP_CTF}}
      - task: build:product
        vars:
          VERSION: "{{.NEW_VERSION}}"
      - task: transfer:airgap
        vars:
          VERSION: "{{.NEW_VERSION}}"
      - task: cluster:import
        vars:
          VERSION: "{{.NEW_VERSION}}"
      - cmd: kubectl apply -f deploy/sample-product-1.1.0.yaml
      - cmd: kubectl wait --for=condition=Ready -n sovereign-product sovereignproduct/sovereign-product --timeout=300s

  # === BUILD TASKS ===
  build:notes:
    desc: Build notes OCM component
    dir: scenarios/sovereign/components/notes
    vars:
      NAME: acme.org/sovereign/notes
      OCI_LAYOUT: './deploy/notes.tar.gz'
    env:
      NAME: '{{.NAME}}'
      VERSION: '{{.VERSION}}'
      OCI_LAYOUT: '{{.OCI_LAYOUT}}'
    cmds:
      - cmd: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION={{.VERSION}} \
            -t '{{.VERSION}}' \
            --output type=oci,dest={{.OCI_LAYOUT}} \
            .
      - defer: rm -rf {{.OCI_LAYOUT}}
      - cmd: |
          {{ .ocm }} add componentversion \
            --repository {{.CTF}} \
            --component-version-conflict-policy=replace \
            --constructor component-constructor.yaml
  
  build:postgres:
    desc: Build postgres OCM component
    dir: scenarios/sovereign/components/postgres
    env:
      NAME: acme.org/sovereign/postgres
      VERSION: '{{.VERSION}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION}}'
    cmd: |
      {{ .ocm }} add componentversion \
        --repository {{.CTF}} \
        --component-version-conflict-policy=replace \
        --constructor component-constructor.yaml

  build:product:
    desc: Build all OCM components into CTF archive
    deps:
      - prepare
      - task: build:notes
        vars:
          VERSION: '{{.VERSION}}'
      - task: build:postgres
        vars:
          VERSION: '{{.VERSION}}'
      - task: product:keys
    dir: scenarios/sovereign/components/product
    env:
      NAME: '{{.NAME}}'
      VERSION: '{{.VERSION}}'
      POSTGRES_VERSION: '{{.POSTGRES_VERSION}}'
    cmds:
      - cmd: |
          {{ .ocm }} add componentversion \
            --repository {{.CTF}} \
            --component-version-conflict-policy=replace \
            --constructor component-constructor.yaml
      - task: sign
        vars:
          COMPONENT: '{{.CTF}}//{{.NAME}}:{{.VERSION}}'

  # === SIGNING TASKS ===
  product:keys:
    status:
      - test -f acme-private.pem
      - test -f acme-public.pem
    desc: Generate RSA key pair for signing
    dir: scenarios/sovereign/keys
    cmds:
      - cmd: |
          openssl genpkey -algorithm RSA -out acme-private.pem -pkeyopt rsa_keygen_bits:4096
          openssl rsa -pubout -in acme-private.pem -out acme-public.pem
  sign:
    desc: Sign all components with RSA key
    dir: scenarios/sovereign/components/product
    env:
      OCM_CONFIG: './config/sign.yaml'
    requires:
      vars: ["COMPONENT"]
    cmd: '{{ .ocm }} sign componentversion {{.COMPONENT}} --loglevel=debug'
  verify:
    desc: Verify component signatures
    dir: scenarios/sovereign/components/product
    env:
      OCM_CONFIG: './config/verify.yaml'
    requires:
      vars: ["COMPONENT"]
    cmd: '{{ .ocm }} verify componentversion {{.COMPONENT}}'

  # === TRANSPORT TASKS ===
  transfer:airgap:
    desc: Transfer components to air-gap archive with verification
    env:
      OCM_CONFIG: '{{ .OCM_CREDENTIALS_CONFIG }}'
    cmds:
      - cmd: rm -rf {{.AIRGAP_CTF}}
      - task: verify
        vars:
          COMPONENT: '{{.CTF}}//{{.NAME}}:{{.VERSION}}'
      - cmd: |
          {{ .ocm }} transfer cv \
            --loglevel=debug \
            --copy-resources \
            --recursive \
            {{.CTF}}//{{.NAME}}:{{.VERSION}} {{.AIRGAP_CTF}} {{ .CLI_ARGS }}

  # === CLUSTER TASKS ===

  cluster:import:
    desc: Transfer CTF archive to airgapped cluster
    cmd: |
      {{ .ocm }} transfer cv \
        --copy-resources \
        --recursive \
        {{.AIRGAP_CTF}}//{{.NAME}}:{{.VERSION}} \
        http://registry:5000
  cluster:install:toolkit:
    desc: Install OCM controller on cluster
    vars:
      TOOLKIT_NAMESPACE: ocm-k8s-toolkit-system
    cmd: |
      helm install ocm-k8s-toolkit oci://ghcr.io/open-component-model/charts/ocm-k8s-toolkit \
        --namespace {{ .TOOLKIT_NAMESPACE }} \
        --create-namespace

  cluster:bootstrap:
    desc: Bootstrap Components
    dir: scenarios/sovereign
    cmds:
    - cmd: kubectl apply -f deploy/namespace.yaml
    - cmd: |
        kubectl -n sovereign-product create secret generic acme-signing-key \
        --from-file=default=keys/acme-public.pem || true
    - cmd: kubectl apply -f deploy/bootstrap.yaml
    - cmd: kubectl wait --for=condition=Ready ResourceGraphDefinition/sovereign-product --timeout=300s
    - cmd: kubectl apply -f deploy/sample-product-1.0.0.yaml
    - cmd: kubectl wait --for=condition=Ready -n sovereign-product sovereignproduct/sovereign-product --timeout=300s

  # === VERIFICATION TASKS ===

  verify:deployment:
    desc: Verify successful deployment and functionality
    cmds:
      - echo "Waiting for components to be ready..."
      - kubectl -n sovereign-product wait --for=condition=Ready
          component/sovereign-product-component --timeout=300s
      - task: test:connectivity

  test:connectivity:
    desc: Test application connectivity and functionality
    silent: true
    cmds:
      - cmd: |
          trap 'kill $PF_PID 2>/dev/null' EXIT
          kubectl -n sovereign-product port-forward svc/sovereign-notes 8085:80 &>/dev/null &
          PF_PID=$!
          until curl -sf http://localhost:8085/readyz &>/dev/null; do sleep 0.5; done
          for ep in readyz notes; do
            curl -sf --max-time 5 "http://localhost:8085/${ep}" > /dev/null \
              && echo "✅ /${ep}" || { echo "❌ /${ep}"; exit 1; }
          done

  # === CLEANUP TASKS ===
  clean:
    desc: Clean up generated data
    cmds:
      - rm -rf {{ .OCM_TMPDIR }}
      - kind delete cluster --name {{.CLUSTER_NAME}} || true
      - docker rm -f registry || true

  # === UTILITY TASKS ===
  prepare:credentials:
    silent: true
    desc: Extract Docker credentials for containerized CLI
    internal: true
    status:
      - test -f {{ .OCM_TMPDIR }}/docker-config.json
    cmds:
      - cmd: |
          SRC="${HOME}/.docker/config.json"
          DST="{{ .OCM_TMPDIR }}/docker-config.json"
          
          [ -f "$SRC" ] || { echo "No Docker config, skipping"; exit 0; }
          
          HELPER="docker-credential-$(jq -r '.credsStore // empty' "$SRC")"
          
          if command -v "$HELPER" >/dev/null 2>&1; then
            "$HELPER" list 2>/dev/null | jq -r 'keys[]' | while IFS= read -r reg; do
              echo "$reg" | "$HELPER" get 2>/dev/null
            done | jq -s '{auths: ([.[] | select(.Username and .Secret) |
              {(.ServerURL): {auth: ((.Username + ":" + .Secret) | @base64)}}] | add // {})}' > "$DST"
          else
            cp "$SRC" "$DST"
          fi
          
          cat > "{{ .OCM_CREDENTIALS_CONFIG }}" <<EOF
          type: generic.config.ocm.software/v1
          configurations:
          - type: credentials.config.ocm.software
            repositories:
            - repository:
                type: DockerConfig/v1
                dockerConfigFile: "$DST"
          EOF
  check:
    silent: true
    desc: Check required dependencies are installed
    cmds:
      - cmd: which docker || (echo "❌ Docker not found" && exit 1)
      - cmd: which kubectl || (echo "❌ kubectl not found" && exit 1)
      - cmd: which kind || (echo "❌ kind not found" && exit 1)
      - cmd: which flux || (echo "❌ flux CLI not found" && exit 1)
      - cmd: which openssl || (echo "❌ openssl not found" && exit 1)
  status:
    desc: Show status of all OCM resources
    silent: true
    cmds:
      - echo "=== Repositories ==="
      - kubectl get repositories -A
      - echo "=== Components ==="
      - kubectl get components  -A
      - echo "=== Resources ==="
      - kubectl get resources -A
      - echo "=== Deployers ==="
      - kubectl get deployers -A