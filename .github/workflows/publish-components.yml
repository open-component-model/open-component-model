name: Publish OCM components

# Publishes ocm.software/{cli,kubernetes/controller,ocm} component-versions to
# GHCR. The `ocm` CLI is run from the multi-arch CLI OCI image this release just
# built. Its ENTRYPOINT is `/ocm`, so `docker run <image>
# add component-version ...` invokes the CLI directly. Running from the image
# avoids deriving a binary name from the runner architecture.
#
# The CLI binaries referenced by the constructor are pulled by the CLI on demand
# from their GitHub release download URLs (using wget access type); the image and chart are
# pinned by digest. All three components are defined in a single constructor file
# and pushed in one call; the OCM CLI resolves dependency order automatically.
#
# After publishing, each of the three component-versions is signed keyless with
# Sigstore (see ADR 0017). OCM shells out to the `cosign` binary, which the
# `FROM scratch` CLI image deliberately does not contain, so cosign is installed
# on the runner (pinned) and bind-mounted onto the container's PATH. The runner's
# GitHub Actions OIDC token (ACTIONS_ID_TOKEN_REQUEST_{TOKEN,URL}) is the signing
# identity — auto-detected by OCM, so no browser and no signing credential in
# .ocmconfig. Because the scratch image has no writable /tmp or $HOME, a tmpfs is
# mounted at /tmp (cosign's TUF cache and OCM's temp signing blobs) and HOME points
# there. The signed descriptors are re-pushed to GHCR with the signature embedded.

on:
  workflow_call:
    inputs:
      version:
        description: "Bare semver, no leading 'v' (0.7.0 or 0.7.0-rc.1). Matches the OCI tags pipeline.yml pushes for the CLI/controller image and chart."
        required: true
        type: string
      release_tag:
        description: "GitHub release tag whose assets host the CLI binaries (e.g. v0.7.0 or v0.7.0-rc.1). The release must already exist."
        required: true
        type: string
      cli_image_digest:
        description: "Digest of the multi-arch CLI OCI image already pushed to ghcr.io/<owner>/cli."
        required: true
        type: string
      controller_image_digest:
        description: "Digest of the controller image already pushed to ghcr.io/<owner>/kubernetes/controller."
        required: true
        type: string
      controller_chart_digest:
        description: "Digest of the Helm chart already pushed to ghcr.io/<owner>/kubernetes/controller/chart."
        required: true
        type: string
      conflict_policy:
        description: "Passed to `ocm add component-version --component-version-conflict-policy`. 'replace' keeps reruns idempotent."
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # mint the GitHub Actions OIDC token used as the Sigstore signing identity
    steps:
      - name: Checkout component constructor
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: .github/components
          persist-credentials: 'false'

      - name: Compute image refs
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CLI_IMAGE_DIGEST: ${{ inputs.cli_image_digest }}
          CONTROLLER_IMAGE_DIGEST: ${{ inputs.controller_image_digest }}
          CONTROLLER_CHART_DIGEST: ${{ inputs.controller_chart_digest }}
        run: |
          set -euo pipefail
          OWNER="${OWNER,,}"
          {
            echo "REPO_ROOT=$REGISTRY/$OWNER"
            echo "CLI_IMAGE_REF=$REGISTRY/$OWNER/cli:${VERSION}@${CLI_IMAGE_DIGEST}"
            echo "CONTROLLER_IMAGE_REF=$REGISTRY/$OWNER/kubernetes/controller:${VERSION}@${CONTROLLER_IMAGE_DIGEST}"
            echo "CONTROLLER_CHART_REF=$REGISTRY/$OWNER/kubernetes/controller/chart:${VERSION}@${CONTROLLER_CHART_DIGEST}"
            echo "CLI_DOWNLOAD_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
            # Component-version references for signing. The empty prefix (`//`) makes
            # the CLI resolve repository=$REGISTRY/$OWNER + the component name to the
            # same component-descriptors/... location `add component-version` pushes to.
            echo "OCM_COMPONENT_REF=$REGISTRY/$OWNER//ocm.software/ocm:${VERSION}"
            echo "CLI_COMPONENT_REF=$REGISTRY/$OWNER//ocm.software/cli:${VERSION}"
            echo "CONTROLLER_COMPONENT_REF=$REGISTRY/$OWNER//ocm.software/kubernetes/controller:${VERSION}"
          } >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write OCM config
        run: |
          set -euo pipefail
          # Path is the in-container mount target, not the runner path.
          cat > "$HOME/.ocmconfig" <<'EOF'
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              repositories:
                - repository:
                    type: DockerConfig/v1
                    dockerConfigFile: /.docker/config.json
                    propagateConsumerIdentity: true
          EOF

      # The CLI image ENTRYPOINT is `/ocm`, so the args after the image name are
      # passed straight to the CLI. The constructor's ${VAR} placeholders are
      # expanded by the CLI (os.Expand) from the -e vars passed into the container.
      - name: Publish component-versions
        env:
          VERSION: ${{ inputs.version }}
          CONFLICT_POLICY: ${{ inputs.conflict_policy }}
          WORKSPACE: ${{ github.workspace }}
          CONSTRUCTOR: ${{ github.workspace }}/.github/components/ocm-release/component-constructor.yaml
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${HOME}/.docker/config.json:/.docker/config.json:ro" \
            -v "${HOME}/.ocmconfig:/.ocmconfig:ro" \
            -v /etc/ssl/certs/:/etc/ssl/certs/:ro \
            -v "${WORKSPACE}:${WORKSPACE}:ro" \
            -w "${WORKSPACE}" \
            -e VERSION \
            -e CLI_DOWNLOAD_URL \
            -e CLI_IMAGE_REF \
            -e CONTROLLER_IMAGE_REF \
            -e CONTROLLER_CHART_REF \
            "$CLI_IMAGE_REF" \
              add component-version \
              --config "/.ocmconfig" \
              --repository "$REPO_ROOT" \
              --constructor "$CONSTRUCTOR" \
              --component-version-conflict-policy "$CONFLICT_POLICY"

      # cosign is installed on the runner (not baked into the scratch CLI image)
      # and bind-mounted into the container in the next step. Keep cosign-release
      # in sync with the version OCM is tested against
      # (bindings/go/sigstore/signing/handler/internal/.env, minimum v3.0.4).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      # Sign each published component-version keyless with Sigstore. OCM shells out
      # to cosign, so the runner's cosign binary is mounted onto the container PATH.
      # The scratch image has no writable /tmp or $HOME, so a tmpfs is mounted at
      # /tmp (OCM's temp signing blobs + cosign's TUF cache) with HOME/TMPDIR pointing
      # there. ACTIONS_ID_TOKEN_REQUEST_{TOKEN,URL} are the ambient GitHub Actions OIDC
      # credentials; OCM auto-detects them and forwards them to cosign, so no browser
      # flow and no signing credential in .ocmconfig are needed. --force keeps reruns
      # idempotent by overwriting the "default" signature if it already exists.
      - name: Sign component-versions (keyless Sigstore)
        env:
          WORKSPACE: ${{ github.workspace }}
          SIGNER_SPEC: ${{ github.workspace }}/.github/components/ocm-release/sigstore-sign.yaml
        run: |
          set -euo pipefail
          # Resolve to the real binary: cosign-installer may expose cosign via a
          # symlink, and docker bind-mount sources must be concrete paths.
          COSIGN_BIN="$(readlink -f "$(command -v cosign)")"

          for ref in "$OCM_COMPONENT_REF" "$CLI_COMPONENT_REF" "$CONTROLLER_COMPONENT_REF"; do
            echo "::group::Signing ${ref}"
            docker run --rm \
              --tmpfs /tmp:rw,exec \
              -e HOME=/tmp \
              -e TMPDIR=/tmp \
              -e PATH=/usr/local/bin:/usr/bin:/bin \
              -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
              -e ACTIONS_ID_TOKEN_REQUEST_URL \
              -v "${COSIGN_BIN}:/usr/local/bin/cosign:ro" \
              -v "${HOME}/.docker/config.json:/.docker/config.json:ro" \
              -v "${HOME}/.ocmconfig:/.ocmconfig:ro" \
              -v /etc/ssl/certs/:/etc/ssl/certs/:ro \
              -v "${WORKSPACE}:${WORKSPACE}" \
              -w "${WORKSPACE}" \
              "$CLI_IMAGE_REF" \
                sign component-version \
                --config "/.ocmconfig" \
                --signer-spec "$SIGNER_SPEC" \
                --force \
                "$ref"
            echo "::endgroup::"
          done
