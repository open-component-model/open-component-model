# TEMPORARY — end-to-end test harness for publish-components.yml on the fork.
# Triggers on push to this branch whenever the relevant files change, so it
# does not need to be on the default branch. DELETE before merging to upstream.
name: TEST sign-components e2e

on:
  push:
    branches:
      - feat/sign-ocm-components-cosign
    paths:
      - .github/workflows/test-sign-components.yml
      - .github/workflows/publish-components.yml
      - .github/components/ocm-release/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_sign:
    name: Publish + sign 0.7.0-rc.1
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write # forwarded to publish-components.yml for keyless Sigstore signing
    uses: ./.github/workflows/publish-components.yml
    with:
      version: "0.7.0-rc.1"
      release_tag: "v0.7.0-rc.1"
      cli_image_digest: "sha256:17b2ae8a9e3c467a3da452d480df5480d9dd285957007cf8c8dee0c8af0f606e"
      controller_image_digest: "sha256:504b1e9bf51aa79bc6531f292e52bfb6287d7daa80931dd10c3650e838e3d55c"
      controller_chart_digest: "sha256:1fae163350ab16eb48cea81cd208d72708b3c9df1351bf5da6202c8a3f059ae1"
      conflict_policy: replace
