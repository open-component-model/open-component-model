name: CI

on:
  pull_request:
  push:
    branches:
    - main

env:
  REF: ${{ github.event.pull_request.head.ref || github.ref }}
  REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

permissions:
  contents: read
  checks: read

jobs:
  discover_modules:
    name: "Discover Go Modules"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      modules_json: ${{ steps.resolve.outputs.modules_json }}
      lint_modules_json: ${{ steps.resolve.outputs.lint_modules_json }}
      integration_test_modules_json: ${{ steps.resolve.outputs.integration_test_modules_json }}
      unit_test_modules_json: ${{ steps.resolve.outputs.unit_test_modules_json }}
      sparse_extras_json: ${{ steps.resolve.outputs.sparse_extras_json }}
      env_changed: ${{ steps.resolve.outputs.env_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
      - name: Resolve Module Lists
        id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
        with:
          script: |
            const script = (await import('${{ github.workspace }}/.github/scripts/resolve-modules.js')).default;
            script({ core });
      - name: Verify Registry is Up to Date
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const script = (await import('${{ github.workspace }}/.github/scripts/verify-registry.js')).default;
            script({ core });

  golangci_lint_verify:
    name: "golangci-lint-verify"
    runs-on: ubuntu-latest
    permissions:
      # Optional: allow write access to checks to allow the action to annotate code in the PR.
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
          sparse-checkout: |
            golangci.yml
            .env
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read tool versions
        id: versions
        run: |
          source .env
          echo "golangci_lint=${GOLANGCI_LINT_VERSION}" >> $GITHUB_OUTPUT
      - name: Verify the golangci-lint config
        run:
          task tools:golangci-lint/verify

  golangci_lint:
    name: "golangci-lint"
    needs:
     - discover_modules
     - golangci_lint_verify
    runs-on: ubuntu-latest
    permissions:
      # Optional: allow write access to checks to allow the action to annotate code in the PR.
      checks: write
    # Run for all modules when .env changed, else only for changed modules
    if: ${{ needs.discover_modules.outputs.lint_modules_json != '[]' }}
    strategy:
      matrix:
        module: ${{ fromJSON(needs.discover_modules.outputs.lint_modules_json) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
          sparse-checkout: |
            ${{ matrix.module }}
            golangci.yml
            .env
            ${{ fromJSON(needs.discover_modules.outputs.sparse_extras_json)[matrix.module] || '' }}
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: '${{ github.workspace }}/${{ matrix.module }}/go.mod'
          cache-dependency-path: '${{ github.workspace }}/${{ matrix.module }}/go.sum'
      - name: Read tool versions
        id: versions
        run: |
          source .env
          echo "golangci_lint=${GOLANGCI_LINT_VERSION}" >> $GITHUB_OUTPUT
      - name: golangci-lint ${{ matrix.modules }}
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          verify: 'false' # we verify in a separate command ONCE instead of every run on every module
          version: ${{ steps.versions.outputs.golangci_lint }}
          working-directory: ${{ github.workspace }}/${{ matrix.module }}
          args: --timeout 10m --config=${{ github.workspace }}/golangci.yml

  run_integration_tests:
    name: "Integration Tests"
    needs: discover_modules
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.discover_modules.outputs.integration_test_modules_json)[0] != null }} # skip if no modules are found
    strategy:
      matrix:
        module: ${{ fromJSON(needs.discover_modules.outputs.integration_test_modules_json) }}
    env:
      TESTCONTAINER_DOCKER_NETWORK: integration-testcontainers
    steps:
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: '${{ github.workspace }}/${{ matrix.module }}/go.mod'
          cache-dependency-path: '${{ github.workspace }}/${{ matrix.module }}/go.sum'
      - name: Create Docker network for running Testcontainers
        run: docker network create ${{ env.TESTCONTAINER_DOCKER_NETWORK }}
      - name: Run Tests
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          GITHUB_USER: ocmbot[ocm]
        run: task ${{ matrix.module }}:test/integration

  run_unit_tests:
    name: "Unit Tests"
    needs: discover_modules
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.discover_modules.outputs.unit_test_modules_json)[0] != null }} # skip if no modules are found
    strategy:
      matrix:
        module: ${{ fromJSON(needs.discover_modules.outputs.unit_test_modules_json) }}
    steps:
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
          sparse-checkout: |
            ${{ matrix.module }}
            reuse.Taskfile.yml
            ${{ fromJSON(needs.discover_modules.outputs.sparse_extras_json)[matrix.module] || '' }}
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: '${{ github.workspace }}/${{ matrix.module }}/go.mod'
          cache-dependency-path: '${{ github.workspace }}/${{ matrix.module }}/go.sum'
      - name: Run Tests
        run: task ${{ matrix.module }}:test

  analyze-go:
    name: "Analyze Go Modules"
    needs: discover_modules
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      security-events: write
    if: ${{ fromJSON(needs.discover_modules.outputs.modules_json)[0] != null }} # skip if no modules are found
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.discover_modules.outputs.modules_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
          # we have a self reference here because CodeQL does introspection on the step
          sparse-checkout: |
            .github/workflows/ci.yml
            ${{ matrix.project }}
            ${{ fromJSON(needs.discover_modules.outputs.sparse_extras_json)[matrix.project] || '' }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          languages: go
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@820e3160e279568db735cee8ed8f8e77a6da7818 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          category: "/language:go"

  generate:
    runs-on: ubuntu-latest
    name: "Code Generation"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Go (required by some generators)
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: ${{ github.workspace }}/bindings/go/generator/go.mod
          cache-dependency-path: |
            ${{ github.workspace }}/bindings/go/generator/go.sum
      - name: Run Code Generation
        run: task generate
      - name: Ensure Clean Target Repository
        run: |
          gitStatus="$(git status --porcelain)"
          if [[ -z "${gitStatus}" ]]; then
              exit 0
          fi
          echo "${gitStatus}"
          exit 1

  # failure aggregation job
  # Our CI matrix is dynamic so it cannot be used for required status checks in github.
  # However we can add a failure step that can get triggered if any dependency fails or is cancelled.
  # If this is the case, this job will fail. If CI is successful, the CI Completion Check will be skipped.
  # see https://github.com/orgs/community/discussions/60792 for details on why this is needed
  check-completion:
    name: "Completion"
    runs-on: ubuntu-latest
    needs:
      - discover_modules
      - generate
      - analyze-go
      - run_unit_tests
      - run_integration_tests
      - golangci_lint
    if: ${{ failure() }}
    steps:
      - name: Some CI step failed or was cancelled!
        run: exit 1
