name: Pull Request
# pull_request_target is required to allow labeling on fork PRs (needs write access).
# No PR code is executed — only the base repository's labeler config is read.
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] intentional: no PR code executed, only base repo config read
    # make sure that when the PR changes, we also update
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  conventional-commit-labeler:
    name: Label PR based on Conventional Commit Specification
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/scripts/label-pr.js
          persist-credentials: false
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          TYPE_TO_LABEL: |
            {
              "feat":"kind/feature",
              "fix":"kind/bugfix",
              "chore":"kind/chore",
              "docs":"area/documentation",
              "test":"area/testing",
              "perf":"area/performance"
            }
          SCOPE_TO_LABEL: |
            {
              "deps":"kind/dependency"
            }
          BREAKING_CHANGE_LABEL: "!BREAKING-CHANGE!"
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/label-pr.js')
            await script.labelPR({ github, context })
  labeler:
    needs: [conventional-commit-labeler]
    name: Label PR based on Config
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/config/labeler.yml
          persist-credentials: false
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          configuration-path: .github/config/labeler.yml
  size-labeler:
    # codelytv/pr-size-labeler Dockerfile downloads x86_64-only docpars binary.
    runs-on: ubuntu-latest
    name: Label PR based on size
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: '10'
          s_label: 'size/s'
          s_max_size: '100'
          m_label: 'size/m'
          m_max_size: '500'
          l_label: 'size/l'
          l_max_size: '10000'
          xl_label: 'size/xl'
          fail_if_xl: 'false'
          message_if_xl: >
            This PR exceeds the recommended size of 10000 lines.
            Please make sure you are NOT addressing multiple issues with one PR.
            Note this PR might be rejected due to its size.
          # github_api_url: 'api.github.com'
          # files_to_ignore: ''
  verify-labels:
    needs: [labeler, size-labeler, conventional-commit-labeler]
    uses: ./.github/workflows/verify-labels.yaml
    permissions:
      pull-requests: read
    with:
      any_of: kind/chore,kind/bugfix,kind/feature,kind/dependency,kind/refactor
