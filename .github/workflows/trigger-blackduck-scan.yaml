# Trigger central Black Duck scan workflow for the Open Component Model project.
# pull_request_target is required to allow scanning fork PRs (passes secrets to called workflow).
# No PR code is executed — this workflow only dispatches to the central scan workflow.
name: Trigger Blackduck Scan
on:
  push:
    paths-ignore:
    - '.github/workflows/**'
    branches: [ "main" ]
  pull_request_target: # zizmor: ignore[dangerous-triggers] intentional: no PR code executed, dispatches to central scan workflow
    paths-ignore:
    - '.github/workflows/**'
    branches: [ "main" ]
  schedule:
    - cron:  '10 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-scan:
    uses: open-component-model/.github/.github/workflows/blackduck-scan.yaml@c878408ef4362b719549404c49c47833dba69e5a
    with:
      # required to be able to differentiate between PRs and pushes in the called workflow (rapid or full scan)
      event_type: ${{ github.event_name }}
      detector_search_depth: 3
    secrets: inherit # zizmor: ignore[secrets-inherit] external org workflow requires all secrets