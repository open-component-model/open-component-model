name: Sigstore Integration Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'bindings/go/sigstore/**'
      - '.github/workflows/sigstore-integration.yml'
  push:
    branches: [main]
    paths:
      - 'bindings/go/sigstore/**'

permissions:
  contents: read

jobs:
  sigstore-e2e:
    name: "Sigstore E2E (scaffolding)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bindings/go/sigstore/integration/go.mod
          cache-dependency-path: bindings/go/sigstore/integration/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Setup Sigstore scaffolding
        uses: sigstore/scaffolding/actions/setup@v0.7.31

      - name: Extract sigstore env and run tests
        working-directory: bindings/go/sigstore/integration
        run: |
          mkdir -p tmp
          bash hack/extract-sigstore-env.sh > tmp/sigstore-env.sh
          source tmp/sigstore-env.sh
          go test -count=1 -run "Integration" -timeout 180s -v ./...
