name: Conformance

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - conformance/**
      - .github/workflows/conformance.yml
  pull_request:
    branches:
      - main
    paths:
      - conformance/**
      - .github/workflows/conformance.yml

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Sovereign Scenario
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: conformance/scenarios/sovereign
      - uses: actions/setup-go@v6
        with:
          go-version-file: conformance/scenarios/sovereign/components/notes/go.mod
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v4.0.0
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@8454b02a32e48d775b9f563cb51fdcb1787b5b93 # v2.7.5

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.31.0
      - name: Check dependencies
        working-directory: conformance/scenarios/sovereign
        run: task check
      - name: Run conformance scenario
        working-directory: conformance/scenarios/sovereign
        run: task run
      - name: Run upgrade scenario
        working-directory: conformance/scenarios/sovereign
        run: task upgrade
      - name: Verify upgrade
        working-directory: conformance/scenarios/sovereign
        run: task verify:deployment
      - name: Show status
        if: always()
        working-directory: conformance/scenarios/sovereign
        run: task status
      - name: Cleanup
        if: always()
        working-directory: conformance/scenarios/sovereign
        run: task clean