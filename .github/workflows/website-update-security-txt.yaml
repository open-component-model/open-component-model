name: "Website: Update security.txt"

on:
  schedule:
    # Run every weekday in December at 09:00 UTC. The create-pull-request
    # action is idempotent so repeated runs simply update the same PR branch.
    - cron: '0 9 * 12 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        sparse-checkout: website/static/.well-known/security.txt
        sparse-checkout-cone-mode: false

    - name: Bump Expires date by one year
      run: |
        set -euo pipefail
        FILE=website/static/.well-known/security.txt
        CURRENT=$(sed -n 's/^Expires:[[:space:]]*//p' "$FILE")
        if [[ -z "${CURRENT}" ]]; then
          echo "::error::Missing Expires field in ${FILE}"
          exit 1
        fi
        NEW=$(date -u -d "$CURRENT + 1 year" '+%Y-%m-%dT%H:%M:%S.000Z' 2>/dev/null \
              || date -u -j -v+1y -f '%Y-%m-%dT%H:%M:%S.000Z' "$CURRENT" '+%Y-%m-%dT%H:%M:%S.000Z') \
              || { echo "::error::Could not parse Expires value: ${CURRENT}"; exit 1; }
        if [[ -z "${NEW}" ]]; then
          echo "::error::Computed Expires is empty"
          exit 1
        fi
        sed -i "s|^Expires:.*|Expires: $NEW|" "$FILE"
        echo "Updated Expires: $CURRENT → $NEW"

    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
      with:
        app_id: ${{ secrets.OCMBOT_APP_ID }}
        private_key: ${{ secrets.OCMBOT_PRIV_KEY }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ steps.generate_token.outputs.token }}
        title: "chore: renew security.txt expiry date"
        commit-message: "[github-actions] renew security.txt expiry date"
        branch: security/renew-security-txt
        delete-branch: true
        sign-commits: true
        labels: |
          kind/chore
        body: |
          Automated renewal of the `Expires` field in `website/static/.well-known/security.txt`.

          The expiry date has been advanced by one year. Please review and merge to keep
          the security.txt valid per [RFC 9116](https://www.rfc-editor.org/rfc/rfc9116).
