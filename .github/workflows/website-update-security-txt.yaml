name: "Website: Update security.txt"

on:
  schedule:
    # Run on December 1st — gives the team ~30 days before the Dec 31
    # expiry to review and merge the renewal PR.
    - cron: '0 9 1 12 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Bump Expires date by one year
      run: |
        FILE=website/static/.well-known/security.txt
        # Extract current Expires value (e.g. 2027-04-24T00:00:00.000Z)
        CURRENT=$(grep '^Expires:' "$FILE" | sed 's/Expires: //')
        # Advance by exactly one year using the date tool
        NEW=$(date -u -d "$CURRENT + 1 year" '+%Y-%m-%dT%H:%M:%S.000Z' 2>/dev/null \
              || date -u -j -v+1y -f '%Y-%m-%dT%H:%M:%S.000Z' "$CURRENT" '+%Y-%m-%dT%H:%M:%S.000Z')
        sed -i "s|^Expires:.*|Expires: $NEW|" "$FILE"
        echo "Updated Expires: $CURRENT → $NEW"

    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
      with:
        app_id: ${{ secrets.OCMBOT_APP_ID }}
        private_key: ${{ secrets.OCMBOT_PRIV_KEY }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ steps.generate_token.outputs.token }}
        title: "chore: renew security.txt expiry date"
        commit-message: "[github-actions] renew security.txt expiry date"
        branch: security/renew-security-txt
        delete-branch: true
        sign-commits: true
        labels: |
          kind/chore
        body: |
          Automated renewal of the `Expires` field in `website/static/.well-known/security.txt`.

          The expiry date has been advanced by one year. Please review and merge to keep
          the security.txt valid per [RFC 9116](https://www.rfc-editor.org/rfc/rfc9116).
