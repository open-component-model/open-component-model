name: Validate PR Title
# Validates that the PR title follows the Conventional Commit specification.
# Uses pull_request (not pull_request_target) because title validation is read-only
# and requires no write permissions.
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions: {}

jobs:
  validate-title:
    name: Validate PR Title (Conventional Commit)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/scripts/label-pr.js
          persist-credentials: false
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ALLOWED_TYPES: |
            feat
            fix
            chore
            docs
            test
            perf
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/label-pr.js')
            script.validatePRTitle({ core, context })
