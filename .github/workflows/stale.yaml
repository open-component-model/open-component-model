name: 'Mark stale issues and PRs'
on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:
    inputs:

permissions:
  contents: read

jobs:
  stale:  # call reusable workflow from central '.github' repo
    permissions:
      issues: write
      pull-requests: write
      contents: read
    uses: open-component-model/.github/.github/workflows/stale.yml@b5b9d0b1f2dbf8bc755f613fcc59e7ce5338f9e4 # main
    secrets: inherit