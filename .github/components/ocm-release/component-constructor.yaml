components:
  - name: ocm.software/cli
    version: "${VERSION}"
    provider:
      name: ocm.software
    resources:
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: linux
          architecture: amd64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-linux-amd64"
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: linux
          architecture: arm64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-linux-arm64"
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: darwin
          architecture: amd64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-darwin-amd64"
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: darwin
          architecture: arm64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-darwin-arm64"
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: windows
          architecture: amd64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-windows-amd64"
      - name: cli
        type: executable
        version: "${VERSION}"
        labels:
          - name: downloadName
            value: ocm
        extraIdentity:
          os: windows
          architecture: arm64
        relation: local
        input:
          type: file
          path: "${CLI_ASSETS}/bin/ocm-windows-arm64"
      - name: image
        type: ociImage
        version: "${VERSION}"
        relation: local
        access:
          type: ociArtifact
          imageReference: "${CLI_IMAGE_REF}"

  - name: ocm.software/controller
    version: "${VERSION}"
    provider:
      name: ocm.software
    resources:
      - name: image
        type: ociImage
        version: "${VERSION}"
        relation: local
        access:
          type: ociArtifact
          imageReference: "${CONTROLLER_IMAGE_REF}"
      - name: chart
        type: helmChart
        version: "${VERSION}"
        relation: local
        access:
          type: ociArtifact
          imageReference: "${CONTROLLER_CHART_REF}"

  - name: ocm.software/ocm
    version: "${VERSION}"
    provider:
      name: ocm.software
    componentReferences:
      - name: cli
        componentName: ocm.software/cli
        version: "${VERSION}"
      - name: controller
        componentName: ocm.software/controller
        version: "${VERSION}"
