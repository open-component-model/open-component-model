[build.environment]
  NODE_VERSION = "25.8.1"
  NPM_VERSION = "11.11.1"

[build]
  # rebuild when paths mounted by the "main" site version change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../cli/docs/reference ../bindings/go/constructor/spec/v1/resources ../bindings/go/descriptor/v2/resources ../kubernetes/controller/config/crd/bases"

[context.deploy-preview]
  command = "npm ci && npm run build -- --baseURL=$DEPLOY_PRIME_URL --buildDrafts --buildFuture"
  publish = "public"

[context.production]
  command = "npm ci && npm run build"
  publish = "public"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"

	[plugins.inputs]
    baseUrl = "https://doks.netlify.app/"
    sitemapPath = "/sitemap.xml"
    ignorePeriod = 0
    providers = [
      "google",
      "yandex"
    ]
