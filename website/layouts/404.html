{{ define "main" }}
<div class="lp-home">
  <div class="container">
    <div class="main">
      <h1 class="heading">
        <span class="name clip">404</span>
        <span class="text">
          <span class="hero-line">Page not found</span>
        </span>
      </h1>
      <div class="subheadlines">
        <p class="subheadline">The page you’re looking for doesn’t exist or may have moved.</p>
      </div>
      <div class="hero-actions">
        <a class="hero-button hero-button--brand" href="{{ site.Home.RelPermalink }}">Back to home</a>
        <a class="hero-button hero-button--alt" href="{{ "docs/getting-started/" | relLangURL }}">Get Started</a>
      </div>
    </div>
    <div class="image">
      <div class="image-container">
        <div class="image-bg"></div>
        <img class="image-src" src='{{ "images/base.svg" | relURL }}' alt="Page not found" />
      </div>
    </div>
  </div>
</div>
{{ end }}
