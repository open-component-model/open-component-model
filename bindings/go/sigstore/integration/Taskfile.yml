version: '3'

includes:
  reuse: ../../../../reuse.Taskfile.yml

vars:
  INTEGRATION_TEST_IDENTIFIER: 'Integration'

tasks:
  test/integration:
    desc: "Run sigstore testcontainer-based integration tests (requires Docker)"
    cmds:
      - task: reuse:run-go-test
        vars:
          GO_TEST_FLAGS: '-count=1 -run "{{ .INTEGRATION_TEST_IDENTIFIER }}" -timeout 180s'
